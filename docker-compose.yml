x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-change_me_local_only}@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-Wko8JJwoknSgReHbP_yqdd4Pe0cIBDTB4umBfuk6y50=}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:-dev_webserver_secret_change_me}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
    PYTHONPATH: /opt/airflow/project/src
    MARKET_DATA_PIPELINE_PARQUET_ROOT: /opt/airflow/data/lakehouse
    MARKET_DATA_PIPELINE_STATE_PATH: /opt/airflow/data/state/pipeline_state.json
    MARKET_DATA_STREAM_ALERTS_PATH: /opt/airflow/data/alerts/threshold_alerts.jsonl
    MARKET_DATA_STREAM_TICKS_PATH: /opt/airflow/data/streaming/ticks
    MARKET_DATA_POSTGRES_DSN: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-change_me_local_only}@postgres:5432/${POSTGRES_DB:-market_data}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/project/src
    - ./sql:/opt/airflow/project/sql
    - ./data:/opt/airflow/data
    - airflow_logs:/opt/airflow/logs

services:
  postgres:
    image: postgres:16-alpine
    container_name: market-data-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local_only}
      POSTGRES_DB: ${POSTGRES_DB:-market_data}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - market_data_net

  # Optional legacy single-container scheduler (disable when using Airflow).
  pipeline:
    profiles: ["legacy"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: market-data-pipeline
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./:/app
      - ./data:/app/data
    command: ["python", "-m", "market_data_platform.cli", "scheduler"]
    networks:
      - market_data_net

  airflow-init:
    <<: *airflow-common
    container_name: market-data-airflow-init
    # Login shell so PATH reliably includes the Airflow CLI on slim images.
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - |
        set -e
        airflow db migrate
        airflow users create \
          --username "${AIRFLOW_ADMIN_USERNAME:-admin}" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email "${AIRFLOW_ADMIN_EMAIL:-admin@localhost}" \
          --password "${AIRFLOW_ADMIN_PASSWORD:-admin}" \
          || true
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - market_data_net

  airflow-webserver:
    <<: *airflow-common
    container_name: market-data-airflow-webserver
    restart: unless-stopped
    command: webserver
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8080}:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - market_data_net

  airflow-scheduler:
    <<: *airflow-common
    container_name: market-data-airflow-scheduler
    restart: unless-stopped
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - market_data_net

volumes:
  postgres_data:
    name: market_data_postgres_data
  airflow_logs:
    name: market_data_airflow_logs

networks:
  market_data_net:
    name: market_data_net
